<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile — DHAS</title>
  <script src="js/config.js"></script>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --teal:    #00c9b1;
      --green:   #059669;
      --green-lt:#34d399;
      --navy:    #0b1437;
      --blue:    #2a6cf6;
      --amber:   #f59e0b;
      --rose:    #f25c7d;
      --bg:      #f4f6fc;
      --surface: #ffffff;
      --border:  #e4e9f4;
      --text:    #0d1b3e;
      --muted:   #6b7fa3;
      --radius:  18px;
      --shadow:  0 2px 20px rgba(42,108,246,.09);
      --shadow-md: 0 8px 40px rgba(0,0,0,.12);
    }
    html.dark body, body.dark {
      --bg:     #080f28;
      --surface:#111c3c;
      --border: #1e2e58;
      --text:   #e8efff;
      --muted:  #7d93c3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      transition: background .35s, color .35s;
    }

    /* ── TOPBAR ─────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 60px; display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
      background: rgba(255,255,255,.9); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: background .35s;
    }
    body.dark .topbar { background: rgba(8,15,40,.92); }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      padding: 7px 12px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--bg);
      text-decoration: none; transition: all .18s;
    }
    .back-btn:hover { color: var(--blue); border-color: var(--blue); }
    .back-btn i { font-size: 15px; }
    .topbar-title {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: .95rem; color: var(--text); flex: 1; text-align: center;
    }
    .topbar-spacer { width: 90px; }

    /* ── PAGE ───────────────────────────────────────────── */
    .page { max-width: 600px; margin: 0 auto; padding: 0 0 60px; }

    /* ── HERO ───────────────────────────────────────────── */
    .hero {
      background: linear-gradient(145deg, #064e3b 0%, #065f46 40%, #059669 80%, #00c9b1 100%);
      padding: 40px 24px 72px;
      text-align: center; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 250px; height: 250px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,201,177,.25), transparent 70%);
      pointer-events: none;
    }
    .hero::after {
      content: ''; position: absolute; bottom: -70px; left: 15%;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.06), transparent 70%);
      pointer-events: none;
    }

    .hero-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      background: linear-gradient(135deg, #059669, var(--teal));
      border: 4px solid rgba(255,255,255,.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 2.4rem;
      font-weight: 700; color: #fff;
      margin: 0 auto 16px; overflow: hidden;
      position: relative; z-index: 1;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .verified-ring {
      position: absolute; bottom: 4px; right: 4px;
      width: 28px; height: 28px; border-radius: 50%;
      background: #fff; border: 2px solid #059669;
      display: flex; align-items: center; justify-content: center;
    }
    .verified-ring i { font-size: 14px; color: #059669; }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.65rem; font-weight: 900; color: #fff;
      margin-bottom: 6px; position: relative; z-index: 1;
    }
    .hero-spec {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.25);
      border-radius: 20px; padding: 5px 14px;
      font-size: .8rem; font-weight: 700; color: rgba(255,255,255,.9);
      margin-bottom: 16px; position: relative; z-index: 1;
    }
    .hero-spec i { font-size: 13px; }

    .hero-stats {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      max-width: 380px; margin: 0 auto; position: relative; z-index: 1;
    }
    .hstat {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px; padding: 10px 8px; text-align: center;
    }
    .hstat-val {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 700; color: #fff; line-height: 1;
    }
    .hstat-lbl { font-size: .62rem; color: rgba(255,255,255,.55); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }

    /* ── CONNECT CARD (floats up) ─── */
    .connect-float {
      margin: -34px 16px 0; position: relative; z-index: 10;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px;
    }
    .invite-wrap { flex: 1; min-width: 0; }
    .invite-label { font-size: .68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 5px; }
    .invite-pill {
      font-family: 'DM Sans', sans-serif; font-size: 1.2rem; font-weight: 800;
      letter-spacing: 3px; color: var(--green); padding: 6px 0; display: block;
    }
    .invite-hint { font-size: .73rem; color: var(--muted); margin-top: 3px; line-height: 1.5; }
    .copy-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 16px; border-radius: 12px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      color: #fff; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 700;
      transition: all .2s; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(5,150,105,.3);
    }
    .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(5,150,105,.4); }
    .copy-btn.copied { background: linear-gradient(135deg, #16a34a, #22d07a); }
    .copy-btn i { font-size: 18px; }

    /* ── SECTION ────────────────────────────────────────── */
    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); margin: 0 16px 12px;
    }
    .section-head {
      padding: 13px 18px; border-bottom: 1px solid var(--border);
      font-size: .68rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .9px;
      display: flex; align-items: center; gap: 7px;
    }
    .section-head i { font-size: 13px; color: var(--green); }

    /* ── INFO ROW ───────────────────────────────────────── */
    .irow {
      display: flex; align-items: flex-start;
      padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 12px;
    }
    .irow:last-child { border-bottom: none; }
    .iicon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .iicon i { font-size: 17px; }
    .icontent { flex: 1; min-width: 0; }
    .ilbl { font-size: .67rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .ival { font-size: .9rem; font-weight: 600; color: var(--text); line-height: 1.5; }
    .ival.empty { color: var(--muted); font-weight: 400; font-style: italic; }

    /* ── BIO ────────────────────────────────────────────── */
    .bio-text {
      padding: 18px; font-size: .9rem; color: var(--text);
      line-height: 1.7; border-bottom: 1px solid var(--border);
    }
    .bio-text:last-child { border-bottom: none; }

    /* ── EXPERTISE TAGS ──────────────────────────────────── */
    .tags-wrap { padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 7px; }
    .etag {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(5,150,105,.08); border: 1px solid rgba(5,150,105,.2);
      color: var(--green); border-radius: 20px;
      padding: 4px 12px; font-size: .76rem; font-weight: 600;
    }
    body.dark .etag { background: rgba(5,150,105,.15); border-color: rgba(5,150,105,.3); color: var(--green-lt); }
    .etag i { font-size: 11px; }

    /* ── MEMBER SINCE FOOTER ─────────────────────────────── */
    .member-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px;
      margin: 0 16px 12px;
      font-size: .8rem; color: var(--muted);
      box-shadow: var(--shadow);
    }
    .member-badge i { font-size: 16px; color: var(--muted); }
    .member-badge strong { color: var(--text); }

    /* ── DISCLAIMER ──────────────────────────────────────── */
    .disclaimer {
      text-align: center; font-size: .7rem; color: var(--muted);
      padding: 16px; line-height: 1.7;
    }

    /* ── LOADING / TOAST ─────────────────────────────────── */
    .loading-wrap {
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      margin: 0 auto 16px;
      border: 3px solid var(--border); border-top-color: var(--green);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #d1fae5; border: 1.5px solid #6ee7b7; color: #065f46;
      border-radius: 12px; padding: 10px 22px; font-size: .85rem; font-weight: 600;
      display: none; z-index: 9999; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }
    body.dark #toast { background: #052e16; border-color: #166534; color: #86efac; }

    /* ── ERROR STATE ─────────────────────────────────────── */
    .error-wrap {
      text-align: center; padding: 60px 24px;
    }
    .error-wrap i { font-size: 48px; color: var(--muted); opacity: .35; display: block; margin-bottom: 14px; }
    .error-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }
    .error-sub { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }
    .back-home {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), #4f8ef9);
      color: #fff; font-weight: 700; font-size: .88rem; text-decoration: none;
      box-shadow: 0 4px 16px rgba(42,108,246,.3);
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeUp .4s ease both; }
  </style>
</head>
<body>

<div id="toast"></div>

<header class="topbar">
  <a href="find_doctor.html" class="back-btn">
    <i class="ti ti-chevron-left" aria-hidden="true"></i>
    Find Doctor
  </a>
  <div class="topbar-title" id="topbarTitle">Doctor Profile</div>
  <div class="topbar-spacer"></div>
</header>

<div class="page" id="pageContent">
  <div class="loading-wrap">
    <div class="spinner"></div>
    Loading doctor profile…
  </div>
</div>

<script>
const BASE = window.API_BASE;

// ── Get doctor ID from URL ───────────────────────────────
const params   = new URLSearchParams(window.location.search);
const doctorId = params.get("id");

// ── Toast ────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(_tt); _tt = setTimeout(() => { t.style.display = "none"; }, 2500);
}

// ── Copy invite code ─────────────────────────────────────
function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add("copied");
    btn.innerHTML = '<i class="ti ti-check"></i><span>Copied!</span>';
    showToast("Invite code copied!");
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = '<i class="ti ti-copy"></i><span>Copy</span>';
    }, 2500);
  }).catch(() => showToast("Code: " + code));
}

// ── Render ───────────────────────────────────────────────
function render(d) {
  const initials = (d.name || "D").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
  const joined   = d.created_at ? new Date(d.created_at).toLocaleDateString("en-IN", { month: "long", year: "numeric" }) : null;
  const location = [d.city, d.state].filter(Boolean).join(", ");

  let expertise = [];
  try { expertise = Array.isArray(d.expertise) ? d.expertise : JSON.parse(d.expertise || "[]"); } catch {}

  // Update topbar
  document.getElementById("topbarTitle").textContent = "Dr. " + (d.name || "");

  const page = document.getElementById("pageContent");
  page.className = "page fade-in";
  page.innerHTML = `

    <!-- HERO -->
    <div class="hero">
      <div class="hero-avatar" style="position:relative;">
        ${d.profile_photo
          ? `<img src="${d.profile_photo}" alt="Dr. ${d.name}">`
          : initials}
        ${d.is_verified ? `<div class="verified-ring"><i class="ti ti-check" aria-label="Verified"></i></div>` : ""}
      </div>
      <div class="hero-name">Dr. ${d.name || ""}</div>
      <div class="hero-spec">
        <i class="ti ti-stethoscope" aria-hidden="true"></i>
        ${d.speciality || "General Physician"}
      </div>
      <div class="hero-stats">
        <div class="hstat">
          <div class="hstat-val">${d.experience_years || "—"}</div>
          <div class="hstat-lbl">Yrs Exp.</div>
        </div>
        <div class="hstat">
          <div class="hstat-val">${parseInt(d.patient_count) || 0}</div>
          <div class="hstat-lbl">Patients</div>
        </div>
        <div class="hstat">
          <div class="hstat-val">${d.is_verified ? "✓" : "—"}</div>
          <div class="hstat-lbl">Verified</div>
        </div>
      </div>
    </div>

    <!-- CONNECT CARD -->
    <div class="connect-float">
      <div class="invite-wrap">
        <div class="invite-label">Your Invite Code</div>
        <span class="invite-pill">${d.invite_code}</span>
        <div class="invite-hint">Enter this code on your profile → <strong>Find Doctor</strong> to connect with Dr. ${(d.name||"").split(" ")[0]}.</div>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyCode('${d.invite_code}', this)">
        <i class="ti ti-copy"></i>
        <span>Copy</span>
      </button>
    </div>

    <!-- PROFESSIONAL INFO -->
    <div class="section">
      <div class="section-head"><i class="ti ti-briefcase-medical" aria-hidden="true"></i>Professional Details</div>

      ${d.hospital ? `
      <div class="irow">
        <div class="iicon" style="background:#e6faf8;color:#059669;"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
        <div class="icontent">
          <div class="ilbl">Hospital / Clinic</div>
          <div class="ival">${d.hospital}</div>
        </div>
      </div>` : ""}

      ${location ? `
      <div class="irow">
        <div class="iicon" style="background:#eff6ff;color:#2a6cf6;"><i class="ti ti-map-pin" aria-hidden="true"></i></div>
        <div class="icontent">
          <div class="ilbl">Location</div>
          <div class="ival">${location}</div>
        </div>
      </div>` : ""}

      ${d.experience_years ? `
      <div class="irow">
        <div class="iicon" style="background:#fef9c3;color:#ca8a04;"><i class="ti ti-clock" aria-hidden="true"></i></div>
        <div class="icontent">
          <div class="ilbl">Experience</div>
          <div class="ival">${d.experience_years} years</div>
        </div>
      </div>` : ""}

      ${d.languages ? `
      <div class="irow">
        <div class="iicon" style="background:#fdf4ff;color:#9333ea;"><i class="ti ti-message-circle" aria-hidden="true"></i></div>
        <div class="icontent">
          <div class="ilbl">Languages</div>
          <div class="ival">${d.languages}</div>
        </div>
      </div>` : ""}

      ${!d.hospital && !location && !d.experience_years && !d.languages ? `
      <div class="irow">
        <div class="icontent" style="padding:4px 0;">
          <div class="ival empty">No additional details provided yet.</div>
        </div>
      </div>` : ""}
    </div>

    <!-- ABOUT / BIO -->
    ${(d.bio || d.about) ? `
    <div class="section">
      <div class="section-head"><i class="ti ti-user" aria-hidden="true"></i>About</div>
      <div class="bio-text">${d.bio || d.about}</div>
    </div>` : ""}

    <!-- EXPERTISE -->
    ${expertise.length > 0 ? `
    <div class="section">
      <div class="section-head"><i class="ti ti-certificate" aria-hidden="true"></i>Areas of Expertise</div>
      <div class="tags-wrap">
        ${expertise.map(e => `<span class="etag"><i class="ti ti-point-filled"></i>${e}</span>`).join("")}
      </div>
    </div>` : ""}

    <!-- MEMBER SINCE -->
    ${joined ? `
    <div class="member-badge">
      <i class="ti ti-calendar" aria-hidden="true"></i>
      Practising on DHAS since <strong>${joined}</strong>
    </div>` : ""}

    <div class="disclaimer">
      This profile is provided for informational purposes only.<br>
      Always verify credentials before booking medical consultations.
    </div>
  `;
}

// ── Error state ──────────────────────────────────────────
function showError(msg) {
  document.getElementById("pageContent").innerHTML = `
    <div class="error-wrap">
      <i class="ti ti-user-off" aria-hidden="true"></i>
      <div class="error-title">Doctor not found</div>
      <div class="error-sub">${msg || "This profile may not exist or is not yet verified."}</div>
      <a href="find_doctor.html" class="back-home">
        <i class="ti ti-arrow-left" style="font-size:14px"></i>
        Back to Find Doctor
      </a>
    </div>`;
}

// ── Load ─────────────────────────────────────────────────
async function load() {
  if (!doctorId) { showError("No doctor ID provided."); return; }
  try {
    const res  = await fetch(`${BASE}/doctor/public/${doctorId}`);
    const data = await res.json();
    if (data.success && data.doctor) {
      render(data.doctor);
    } else {
      showError(data.message || "Profile not found.");
    }
  } catch (e) {
    showError("Cannot reach server. Please check your connection.");
  }
}

load();
</script>
</body>
</html>
