<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find a Doctor — DHAS</title>
  <script src="js/config.js"></script>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --navy: #0b1437; --navy-mid: #112057;
      --blue: #2a6cf6; --blue-lt: #4f8ef9;
      --teal: #00c9b1; --green: #22d07a;
      --amber: #f4a035; --rose: #f25c7d;
      --bg: #f4f6fc; --surface: #ffffff;
      --border: #e4e9f4; --text: #0d1b3e; --muted: #6b7fa3;
      --radius: 18px; --shadow: 0 2px 20px rgba(42,108,246,.09);
      --shadow-md: 0 6px 32px rgba(42,108,246,.14);
    }
    html.dark body, body.dark {
      --bg: #080f28; --surface: #111c3c; --border: #1e2e58;
      --text: #e8efff; --muted: #7d93c3;
      --shadow: 0 2px 20px rgba(0,0,0,.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background .35s, color .35s;
    }

    /* TOPBAR */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 62px; display: flex; align-items: center;
      padding: 0 20px; gap: 14px;
      background: rgba(255,255,255,.9); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border); transition: background .35s;
    }
    body.dark .topbar { background: rgba(8,15,40,.92); }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      padding: 7px 12px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--bg);
      text-decoration: none; transition: all .18s;
    }
    .back-btn:hover { color: var(--blue); border-color: var(--blue); }
    .topbar-title {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: 1rem; color: var(--text); flex: 1; text-align: center;
    }
    .topbar-spacer { width: 90px; }

    .page { max-width: 620px; margin: 0 auto; padding: 20px 16px 60px; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #112057 0%, #2a6cf6 55%, #00c9b1 100%);
      border-radius: 22px; padding: 30px 24px 26px; margin-bottom: 22px;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; top: -40px; right: -40px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.12), transparent 70%);
    }
    .hero::after {
      content: ''; position: absolute; bottom: -50px; left: 30%;
      width: 180px; height: 180px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,201,177,.18), transparent 70%);
    }
    .hero-icon-wrap {
      width: 60px; height: 60px; border-radius: 18px;
      background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; position: relative; z-index: 1;
    }
    .hero-icon-wrap i { font-size: 28px; color: #fff; }
    .hero-title {
      font-family: 'Playfair Display', serif; color: #fff;
      font-size: 1.75rem; font-weight: 900; margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .hero-sub { color: rgba(255,255,255,.72); font-size: .85rem; position: relative; z-index: 1; }

    /* SEARCH */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input {
      width: 100%; padding: 13px 16px 13px 46px;
      border: 2px solid var(--border); border-radius: 14px;
      font-size: .92rem; font-family: 'DM Sans', sans-serif;
      background: var(--surface); color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .search-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(42,108,246,.1); }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 18px;
    }
    body.dark .search-wrap input { background: #111c3c; color: #e8efff; border-color: #1e2e58; }

    /* FILTER TABS */
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .tab-btn {
      padding: 6px 14px; border-radius: 20px; font-size: .78rem; font-weight: 600;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all .18s;
    }
    .tab-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .tab-btn:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

    /* DOCTOR CARD */
    .doctor-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 0; margin-bottom: 12px;
      box-shadow: var(--shadow); overflow: hidden;
      transition: border-color .2s, box-shadow .2s, transform .18s;
      animation: slideIn .25s ease both;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .doctor-card:hover { border-color: var(--blue); box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .card-accent { height: 4px; background: linear-gradient(90deg, var(--blue), var(--teal)); }

    .card-body { padding: 18px 18px 16px; display: flex; gap: 14px; align-items: flex-start; }
    .doc-avatar {
      width: 58px; height: 58px; border-radius: 16px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: #fff;
      overflow: hidden; position: relative;
    }
    .doc-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .doc-online-dot {
      position: absolute; bottom: 3px; right: 3px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--green); border: 2px solid var(--surface);
    }
    .doc-info { flex: 1; min-width: 0; }
    .doc-name {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: 1.05rem; color: var(--text); margin-bottom: 3px;
    }
    .doc-spec {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(42,108,246,.08); border: 1px solid rgba(42,108,246,.15);
      border-radius: 20px; padding: 3px 10px; font-size: .72rem; font-weight: 700;
      color: var(--blue); margin-bottom: 8px;
    }
    body.dark .doc-spec { background: rgba(42,108,246,.15); border-color: rgba(42,108,246,.3); color: #7aafff; }
    .doc-spec i { font-size: 11px; }
    .doc-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .doc-meta-item {
      display: flex; align-items: center; gap: 4px;
      font-size: .74rem; color: var(--muted);
    }
    .doc-meta-item i { font-size: 12px; }
    .doc-bio {
      font-size: .8rem; color: var(--muted); line-height: 1.55;
      display: -webkit-box; -line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      padding: 12px 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .invite-display {
      display: flex; align-items: center; gap: 8px;
    }
    .invite-label { font-size: .7rem; color: var(--muted); font-weight: 600; }
    .invite-code-pill {
      background: rgba(42,108,246,.08); border: 1.5px solid rgba(42,108,246,.2);
      border-radius: 8px; padding: 4px 12px; font-size: .82rem;
      font-weight: 800; color: var(--blue); letter-spacing: 1.5px;
      font-family: 'DM Sans', sans-serif;
    }
    body.dark .invite-code-pill { background: rgba(42,108,246,.15); border-color: rgba(42,108,246,.3); color: #7aafff; }
    .card-actions { display: flex; gap: 8px; }
    .btn-copy {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--bg);
      color: var(--muted); font-size: .75rem; font-weight: 700;
      cursor: pointer; transition: all .18s; font-family: 'DM Sans', sans-serif;
    }
    .btn-copy:hover { border-color: var(--blue); color: var(--blue); }
    .btn-copy.copied { background: #d1fae5; border-color: #6ee7b7; color: #065f46; }
    .btn-copy i { font-size: 13px; }
    .btn-view {
      display: flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 9px;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff; font-size: .75rem; font-weight: 700;
      border: none; cursor: pointer; transition: all .18s;
      text-decoration: none; font-family: 'DM Sans', sans-serif;
    }
    .btn-view:hover { opacity: .9; transform: translateY(-1px); }
    .btn-view i { font-size: 13px; }

    /* PATIENT COUNT BADGE */
    .patient-count {
      display: flex; align-items: center; gap: 4px;
      font-size: .72rem; color: var(--muted); font-weight: 600;
    }
    .patient-count i { font-size: 12px; }

    /* EMPTY */
    .empty-wrap {
      text-align: center; padding: 50px 20px;
      background: var(--surface); border: 1.5px dashed var(--border);
      border-radius: var(--radius);
    }
    .empty-wrap i { font-size: 48px; color: var(--muted); opacity: .35; display: block; margin: 0 auto 12px; }
    .empty-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: .84rem; color: var(--muted); }

    /* LOADING */
    .loading-wrap { text-align: center; padding: 48px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 14px; border: 3px solid var(--border); border-top-color: var(--blue); animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    #dhasToast {
      position: fixed; bottom: 24px; left: 20px; z-index: 99999;
      max-width: 320px; min-width: 220px; padding: 12px 16px;
      border-radius: 12px; font-size: .85rem; font-weight: 600;
      display: none; align-items: center; gap: 8px;
      box-shadow: 0 6px 24px rgba(0,0,0,.18);
    }
    #dhasToast.success { background: #d1fae5; border: 1.5px solid #6ee7b7; color: #065f46; }
    body.dark #dhasToast.success { background: #052e16; border-color: #166534; color: #86efac; }

    /* STATS BANNER */
    .stats-banner {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      margin-bottom: 18px;
    }
    .stat-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 10px; text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-pill-val { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--blue); }
    .stat-pill-lbl { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
  </style>
</head>
<body>

<div id="dhasToast" role="status" aria-live="polite"></div>

<header class="topbar">
  <a href="dashboard.html" class="back-btn">
    <i class="ti ti-chevron-left" style="font-size:15px" aria-hidden="true"></i>
    Dashboard
  </a>
  <div class="topbar-title">Find a Doctor</div>
  <div class="topbar-spacer"></div>
</header>

<div class="page">

  <div class="hero">
    <div class="hero-icon-wrap">
      <i class="ti ti-stethoscope" aria-hidden="true"></i>
    </div>
    <div class="hero-title">Find Your Doctor</div>
    <div class="hero-sub">Browse verified doctors and connect with their invite code</div>
  </div>

  <div class="stats-banner">
    <div class="stat-pill">
      <div class="stat-pill-val" id="statTotal">—</div>
      <div class="stat-pill-lbl">Doctors</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="statSpecs">—</div>
      <div class="stat-pill-lbl">Specialities</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="statPatients">—</div>
      <div class="stat-pill-lbl">Connected</div>
    </div>
  </div>

  <div class="search-wrap">
    <i class="ti ti-search search-icon" aria-hidden="true"></i>
    <input type="text" id="searchInput" placeholder="Search by name or speciality…" oninput="handleSearch()">
  </div>

  <div class="filter-tabs" id="specTabs">
    <button class="tab-btn active" data-spec="All" onclick="filterSpec('All', this)">All</button>
  </div>

  <div id="doctorList">
    <div class="loading-wrap"><div class="spinner"></div>Loading doctors…</div>
  </div>

</div>

<script>
const BASE = window.API_BASE;
let allDoctors  = [];
let activeSpec  = 'All';
let searchQuery = '';

// Toast
let _tt = null;
function showToast(text, type = 'success') {
  const t = document.getElementById('dhasToast');
  t.className = type;
  t.innerHTML = `<i class="ti ti-circle-check" style="font-size:15px"></i> <span>${text}</span>`;
  t.style.display = 'flex';
  if (_tt) clearTimeout(_tt);
  _tt = setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Copied!';
    showToast(`Invite code ${code} copied to clipboard!`);
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy Code';
    }, 2500);
  }).catch(() => {
    showToast('Could not copy — please copy manually: ' + code);
  });
}

function buildDoctorCard(d, idx) {
  const initials = (d.name || 'D').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const avatarContent = d.profile_photo
    ? `<img src="${d.profile_photo}" alt="${d.name}">`
    : initials;

  const expText   = d.experience_years ? `${d.experience_years} yrs exp` : null;
  const cityText  = d.city             ? d.city                          : null;
  const langText  = d.languages        ? d.languages.split(',')[0].trim() + (d.languages.split(',').length > 1 ? ' +' + (d.languages.split(',').length - 1) : '') : null;

  const metaItems = [
    expText  ? `<span class="doc-meta-item"><i class="ti ti-clock" aria-hidden="true"></i>${expText}</span>` : '',
    cityText ? `<span class="doc-meta-item"><i class="ti ti-map-pin" aria-hidden="true"></i>${cityText}</span>` : '',
    langText ? `<span class="doc-meta-item"><i class="ti ti-message-circle" aria-hidden="true"></i>${langText}</span>` : '',
    `<span class="patient-count"><i class="ti ti-users" aria-hidden="true"></i>${d.patient_count || 0} patients</span>`,
  ].filter(Boolean).join('');

  const bio = d.bio || d.about || '';

  return `
    <div class="doctor-card" style="animation-delay:${idx * 40}ms">
      <div class="card-accent"></div>
      <div class="card-body">
        <div class="doc-avatar">
          ${avatarContent}
          <div class="doc-online-dot"></div>
        </div>
        <div class="doc-info">
          <div class="doc-name">Dr. ${d.name}</div>
          <div class="doc-spec">
            <i class="ti ti-stethoscope" aria-hidden="true"></i>
            ${d.speciality || 'General Physician'}
          </div>
          <div class="doc-meta">${metaItems}</div>
          ${bio ? `<div class="doc-bio">${bio}</div>` : ''}
        </div>
      </div>
      <div class="card-footer">
        <div class="invite-display">
          <span class="invite-label">Invite Code</span>
          <span class="invite-code-pill">${d.invite_code}</span>
        </div>
        <div class="card-actions">
          <button class="btn-copy" onclick="copyCode('${d.invite_code}', this)" title="Copy invite code">
            <i class="ti ti-copy" aria-hidden="true"></i> Copy Code
          </button>
          <a href="doctor_profile_public.html?id=${d.id}" class="btn-view">
            <i class="ti ti-user" aria-hidden="true"></i> Profile
          </a>
        </div>
      </div>
    </div>`;
}

function renderDoctors(doctors) {
  const list = document.getElementById('doctorList');
  if (!doctors.length) {
    list.innerHTML = `
      <div class="empty-wrap">
        <i class="ti ti-user-search" aria-hidden="true"></i>
        <div class="empty-title">No doctors found</div>
        <div class="empty-sub">Try a different search or speciality filter.</div>
      </div>`;
    return;
  }
  list.innerHTML = doctors.map((d, i) => buildDoctorCard(d, i)).join('');
}

function filterAndRender() {
  let filtered = allDoctors;
  if (activeSpec !== 'All') {
    filtered = filtered.filter(d => (d.speciality || '').toLowerCase() === activeSpec.toLowerCase());
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(d =>
      d.name.toLowerCase().includes(q) ||
      (d.speciality || '').toLowerCase().includes(q) ||
      (d.city || '').toLowerCase().includes(q)
    );
  }
  renderDoctors(filtered);
}

function filterSpec(spec, btn) {
  activeSpec = spec;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAndRender();
}

function handleSearch() {
  searchQuery = document.getElementById('searchInput').value.trim();
  filterAndRender();
}

function buildSpecTabs(doctors) {
  const specs = [...new Set(doctors.map(d => d.speciality || 'General Physician').filter(Boolean))].sort();
  const tabs  = document.getElementById('specTabs');
  specs.forEach(spec => {
    const btn = document.createElement('button');
    btn.className   = 'tab-btn';
    btn.dataset.spec = spec;
    btn.textContent = spec;
    btn.onclick     = () => filterSpec(spec, btn);
    tabs.appendChild(btn);
  });
}

async function load() {
  try {
    const res  = await fetch(`${BASE}/doctor/all`);
    const data = await res.json();
    if (!data.success) { throw new Error(data.message); }

    allDoctors = data.data || [];

    // Stats
    const specs    = new Set(allDoctors.map(d => d.speciality || 'General Physician'));
    
    let connectedCount = 0;
    const storedUser = localStorage.getItem("dhas_user");
    if (storedUser) {
      try {
        const user = JSON.parse(storedUser);
        const userId = user.id || user.user_id || user.uid;
        if (userId) {
          const myRes = await fetch(`${BASE}/doctor/my-doctors/${userId}`, {
            headers: {
              "Authorization": "Bearer " + localStorage.getItem("dhas_token")
            }
          });
          const myData = await myRes.json();
          if (myData.success && myData.data) {
            connectedCount = myData.data.filter(d => (d.status || "accepted") === "accepted").length;
          }
        }
      } catch (err) {
        console.warn("Failed to fetch connected count:", err);
      }
    }

    document.getElementById('statTotal').textContent    = allDoctors.length;
    document.getElementById('statSpecs').textContent    = specs.size;
    document.getElementById('statPatients').textContent = connectedCount;

    buildSpecTabs(allDoctors);
    renderDoctors(allDoctors);

  } catch (e) {
    document.getElementById('doctorList').innerHTML = `
      <div class="empty-wrap">
        <i class="ti ti-wifi-off" aria-hidden="true"></i>
        <div class="empty-title">Could not load doctors</div>
        <div class="empty-sub">Make sure the server is running on ${BASE}</div>
      </div>`;
  }
}

load();
</script>
</body>
</html>
