<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diet for Your Condition - DHAS</title>
  <script src="theme.js"></script>
  <script src="js/config.js"></script>
  <script src="js/alarm-global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --accent: #10b981;
      --border: #e2e8f0;
      --text: #1e293b;
      --text-muted: #94a3b8;
      --bg: #f0f4ff;
      --surface: #ffffff;
    }

    html.dark, html.dark body, body.dark {
      --bg: #080f28 !important;
      --surface: #111c3c !important;
      --border: #1e2e58 !important;
      --text: #e8efff !important;
      --text-muted: #7d93c3 !important;
      background: #080f28 !important;
      color: #e8efff !important;
    }
    html.dark .result-card, body.dark .result-card {
      background: #111c3c !important; border-color: #1e2e58 !important;
    }
    html.dark .result-title, body.dark .result-title {
      color: #e8efff !important; border-bottom-color: #1e2e58 !important;
    }
    html.dark .back-btn, body.dark .back-btn {
      background: #111c3c !important; border-color: #1e2e58 !important; color: #e8efff !important;
    }
    html.dark .back-btn:hover, body.dark .back-btn:hover {
      border-color: var(--primary) !important; color: #7aafff !important;
    }
    html.dark .food-eat, body.dark .food-eat {
      background: rgba(16,185,129,0.15) !important; color: #6ee7b7 !important;
      border-color: rgba(16,185,129,0.3) !important;
    }
    html.dark .food-avoid, body.dark .food-avoid {
      background: rgba(239,68,68,0.15) !important; color: #fca5a5 !important;
      border-color: rgba(239,68,68,0.3) !important;
    }
    html.dark .food-section-label.eat, body.dark .food-section-label.eat { color: #6ee7b7 !important; }
    html.dark .food-section-label.avoid, body.dark .food-section-label.avoid { color: #fca5a5 !important; }
    html.dark .section-divider, body.dark .section-divider {
      background: linear-gradient(90deg,#2563eb,transparent) !important;
    }
    html.dark .condition-badge, body.dark .condition-badge {
      background: rgba(42,108,246,.18) !important;
      border-color: rgba(42,108,246,.3) !important;
      color: #7aafff !important;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      transition: background .35s, color .35s;
    }

    .dhas-navbar {
      background: linear-gradient(145deg, #112057, #0b1437);
      padding: 0 20px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(37,99,235,0.3);
      position: sticky; top: 0; z-index: 100;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      color: #fff; font-size: 1.2rem; font-weight: 900;
      display: flex; align-items: center; gap: 8px;
    }
    .brand i { font-size: 20px; }
    .dhas-navbar a {
      color: rgba(255,255,255,0.85); font-size: 0.85rem; text-decoration: none;
      background: rgba(255,255,255,0.15); padding: 6px 16px; border-radius: 20px;
      transition: background .2s; display: flex; align-items: center; gap: 5px;
    }
    .dhas-navbar a i { font-size: 14px; }
    .dhas-navbar a:hover { background: rgba(255,255,255,0.25); }

    .page-wrap { max-width: 520px; margin: 0 auto; padding: 20px 16px 50px; }

    .page-header {
      background: linear-gradient(135deg, #112057 0%, #2a6cf6 55%, #00c9b1 100%);
      border-radius: 20px; padding: 28px 20px 24px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .page-header::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 130px; height: 130px; background: rgba(255,255,255,0.07); border-radius: 50%;
    }
    .page-header::after {
      content: ''; position: absolute; bottom: -20px; left: 40px;
      width: 90px; height: 90px; background: rgba(255,255,255,0.05); border-radius: 50%;
    }
    .header-icon-wrap {
      width: 60px; height: 60px; border-radius: 18px;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px; position: relative;
    }
    .header-icon-wrap i { font-size: 28px; color: #fff; }
    .page-title {
      font-family: 'Playfair Display', serif; color: #fff;
      font-size: 1.75rem; font-weight: 900; margin-bottom: 6px; position: relative;
    }
    .page-subtitle { color: rgba(255,255,255,0.72); font-size: 0.85rem; position: relative; }

    .condition-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 20px; padding: 5px 14px;
      font-size: 0.75rem; font-weight: 700;
      color: #fff; margin-top: 12px; position: relative;
    }
    .condition-badge i { font-size: 13px; }

    .result-card {
      background: var(--surface); border-radius: 20px; padding: 22px 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08); border: 2px solid var(--border);
      transition: background .35s, border-color .35s;
      animation: fadeIn .35s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-title {
      font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 900;
      color: var(--text); margin-bottom: 18px; padding-bottom: 12px;
      border-bottom: 2px dashed var(--border);
      display: flex; align-items: center; gap: 10px;
      transition: color .35s, border-color .35s;
    }
    .result-title i { font-size: 22px; color: var(--primary); flex-shrink: 0; }

    .food-section-label {
      font-weight: 700; font-size: 0.82rem; letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
      transition: color .35s;
    }
    .food-section-label i { font-size: 16px; }
    .food-section-label.eat { color: #065f46; }
    .food-section-label.avoid { color: #991b1b; }
    .food-section-label::after {
      content: ''; flex: 1; height: 1.5px; background: currentColor;
      opacity: 0.2; border-radius: 2px;
    }

    .food-tags-wrap { margin-bottom: 20px; }
    .food-tag {
      display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px;
      border-radius: 50px; font-size: 0.82rem; font-weight: 600; margin: 3px;
      font-family: 'DM Sans', sans-serif; transition: background .35s, color .35s;
    }
    .food-tag i { font-size: 13px; }
    .food-eat {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #065f46; border: 1.5px solid #6ee7b7;
    }
    .food-avoid {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: #991b1b; border: 1.5px solid #fca5a5;
    }

    .section-divider {
      height: 2px; background: linear-gradient(90deg, var(--primary), transparent);
      border-radius: 2px; margin: 10px 0 16px; opacity: 0.15;
    }

    .action-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px;
      border-radius: 12px; border: 2px solid var(--border); background: var(--surface);
      color: var(--text); font-weight: 700; font-size: 0.87rem; cursor: pointer;
      transition: all .2s; font-family: 'DM Sans', sans-serif; text-decoration: none;
    }
    .back-btn i { font-size: 16px; }
    .back-btn:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }

    .btn-remedies {
      display: inline-flex; align-items: center; gap: 8px; padding: 11px 20px;
      border-radius: 12px; border: 2px solid #10b981;
      background: linear-gradient(135deg, #d1fae5, #ecfdf5);
      color: #065f46; font-weight: 700; font-size: 0.87rem; cursor: pointer;
      transition: all .2s; font-family: 'DM Sans', sans-serif; text-decoration: none;
      flex: 1; justify-content: center;
    }
    .btn-remedies i { font-size: 16px; }
    .btn-remedies:hover {
      background: linear-gradient(135deg, #a7f3d0, #d1fae5);
      transform: translateY(-2px); box-shadow: 0 6px 18px rgba(16,185,129,0.25);
    }

    .not-found {
      text-align: center; padding: 50px 20px; color: var(--text-muted);
    }
    .not-found i.nf-icon { font-size: 48px; opacity: 0.4; display: block; margin: 0 auto 12px; }
    .not-found .nf-title {
      font-family: 'Playfair Display', serif; font-size: 1.2rem;
      color: var(--text); margin-bottom: 8px;
    }
    .not-found .nf-sub { font-size: 0.87rem; }
  </style>
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand">
      <i class="ti ti-heart" aria-hidden="true"></i>
      DHAS
    </div>
    <a href="dashboard.html">
      <i class="ti ti-chevron-left" aria-hidden="true"></i>
      Dashboard
    </a>
  </nav>

  <div class="page-wrap">

    <div class="page-header">
      <div class="header-icon-wrap">
        <i class="ti ti-salad" aria-hidden="true"></i>
      </div>
      <div class="page-title" id="heroTitle">Diet Guide</div>
      <div class="page-subtitle" id="heroSub">Personalised food recommendations based on your symptoms</div>
      <div class="condition-badge" id="conditionBadge" style="display:none">
        <i class="ti ti-stethoscope" aria-hidden="true"></i>
        <span id="conditionLabel"></span>
      </div>
    </div>

    <div id="content"></div>

  </div>

  <script>
    // ── Complete diet data for every condition the symptom checker can produce ──
    const DIET_MAP = {
      respiratory: {
        name: "Respiratory Distress",
        eat: [
          "Warm soups and broths",
          "Ginger tea with honey",
          "Honey and lemon water",
          "Turmeric milk",
          "Garlic in food",
          "Pomegranate juice",
          "Warm water throughout the day"
        ],
        avoid: [
          "Cold drinks and ice",
          "Dairy in excess (thickens mucus)",
          "Fried and oily foods",
          "Smoking and exposure to smoke",
          "Processed and packaged foods",
          "Spicy food if it triggers coughing"
        ]
      },
      covid_like: {
        name: "COVID-19 Like Illness",
        eat: [
          "Warm turmeric milk twice daily",
          "High protein foods — dal, eggs, paneer",
          "Fresh citrus fruits (oranges, amla)",
          "Giloy / Ashwagandha tea",
          "Zinc-rich foods — pumpkin seeds, chickpeas",
          "Coconut water for hydration",
          "Warm soups and vegetable broth"
        ],
        avoid: [
          "Cold and raw foods",
          "Alcohol completely",
          "Junk and processed food",
          "Excess sugar",
          "Cold drinks",
          "Oily and fried items"
        ]
      },
      flu: {
        name: "Influenza (Flu)",
        eat: [
          "Warm vegetable soup",
          "Oranges and citrus fruits",
          "Ginger tea with honey",
          "Light khichdi",
          "Bananas",
          "Warm water throughout the day",
          "Pomegranate juice"
        ],
        avoid: [
          "Junk food",
          "Cold drinks",
          "Oily and fried foods",
          "Spicy food",
          "Alcohol",
          "Heavy meals"
        ]
      },
      common_cold: {
        name: "Common Cold",
        eat: [
          "Warm soups and broths",
          "Tulsi tea",
          "Ginger-honey milk",
          "Garlic added to food",
          "Vitamin C fruits — oranges, amla",
          "Warm water with lemon and honey",
          "Steamed vegetables"
        ],
        avoid: [
          "Cold water and cold drinks",
          "Ice cream and frozen foods",
          "Fried snacks",
          "Excess sugar",
          "Dairy products (can thicken mucus)",
          "Alcohol"
        ]
      },
      viral_fever: {
        name: "Viral Fever",
        eat: [
          "Warm herbal teas (tulsi, ginger)",
          "Papaya and pomegranate",
          "Light rice porridge (kanji)",
          "Coconut water",
          "Honey with warm water",
          "Fresh fruit juices",
          "Vegetable soup"
        ],
        avoid: [
          "Oily and fried food",
          "Cold items and ice cream",
          "Spicy curries",
          "Junk food",
          "Caffeine and coffee",
          "Heavy protein meals"
        ]
      },
      gastro: {
        name: "Gastroenteritis / Diarrhea",
        eat: [
          "ORS solution — sip frequently",
          "Banana (BRAT diet)",
          "Plain boiled rice",
          "Toast / rusk",
          "Curd — probiotic, helps gut",
          "Coconut water",
          "Clear vegetable soup"
        ],
        avoid: [
          "Oily and fried food",
          "Spicy food",
          "Raw vegetables",
          "Caffeinated drinks",
          "Dairy except curd",
          "Junk food",
          "Sugary drinks"
        ]
      },
      headache: {
        name: "Headache / Migraine",
        eat: [
          "Plenty of water — dehydration worsens headaches",
          "Banana — rich in magnesium",
          "Almonds and walnuts",
          "Spinach",
          "Ginger tea",
          "Watermelon",
          "Peppermint tea"
        ],
        avoid: [
          "Excess caffeine (can trigger rebound headache)",
          "Alcohol",
          "Processed meats (contain nitrites)",
          "Too much salt",
          "Skipping meals",
          "Artificial sweeteners",
          "Aged cheese"
        ]
      },
      sore_throat: {
        name: "Sore Throat",
        eat: [
          "Warm water with honey and lemon",
          "Ginger tea",
          "Turmeric milk at night",
          "Soft foods — khichdi, porridge",
          "Coconut water",
          "Warm soups",
          "Ice chips (numbs pain temporarily)"
        ],
        avoid: [
          "Cold drinks",
          "Ice cream",
          "Spicy food",
          "Alcohol",
          "Hard and crunchy foods",
          "Acidic foods like tomatoes and citrus"
        ]
      },
      nausea: {
        name: "Nausea / Vomiting",
        eat: [
          "Ginger tea — best natural anti-nausea",
          "Plain crackers or dry rusk",
          "Banana",
          "Clear broths",
          "Coconut water",
          "Small frequent meals",
          "Cold or room-temperature foods (less smell)"
        ],
        avoid: [
          "Oily and fried food",
          "Spicy food",
          "Strong-smelling foods",
          "Dairy",
          "Large heavy meals",
          "Sugary drinks",
          "Alcohol"
        ]
      },
      general: {
        name: "General Illness",
        eat: [
          "Fresh fruits",
          "Vegetable soup",
          "Warm water throughout the day",
          "Light dal-rice",
          "Curd",
          "Green vegetables",
          "Coconut water"
        ],
        avoid: [
          "Junk food",
          "Oily and fried food",
          "Cold drinks",
          "Spicy food",
          "Alcohol",
          "Heavy meals"
        ]
      }
    };

    // ── Map symptom.js condition keys to DIET_MAP keys ──
    function mapConditionKey(raw) {
      if (!raw) return "general";
      const c = raw.toLowerCase().trim();
      // Direct matches
      if (DIET_MAP[c]) return c;
      // Fallback mapping
      if (c.includes("covid"))       return "covid_like";
      if (c.includes("flu") || c.includes("influenza")) return "flu";
      if (c.includes("respiratory") || c.includes("chest") || c.includes("breath")) return "respiratory";
      if (c.includes("cold"))        return "common_cold";
      if (c.includes("viral"))       return "viral_fever";
      if (c.includes("gastro") || c.includes("diarrhea") || c.includes("vomit")) return "gastro";
      if (c.includes("head") || c.includes("migraine")) return "headache";
      if (c.includes("throat"))      return "sore_throat";
      if (c.includes("nausea"))      return "nausea";
      return "general";
    }

    function render() {
      const rawKey = localStorage.getItem("dhas_symptom_condition") || localStorage.getItem("dhas_condition") || "";
      const key    = mapConditionKey(rawKey);
      const diet   = DIET_MAP[key];
      const content = document.getElementById("content");

      if (!diet) {
        content.innerHTML = `
          <div class="not-found">
            <i class="ti ti-mood-puzzled nf-icon" aria-hidden="true"></i>
            <div class="nf-title">No condition detected</div>
            <div class="nf-sub">Please go back and complete the symptom checker first.</div>
            <br>
            <a href="symptom.html" class="back-btn" style="display:inline-flex;margin-top:8px;">
              <i class="ti ti-arrow-left" aria-hidden="true"></i> Check Symptoms
            </a>
          </div>`;
        return;
      }

      document.getElementById("heroTitle").textContent  = "Diet for " + diet.name;
      document.getElementById("heroSub").textContent    = "Recommended and restricted foods for " + diet.name;
      document.getElementById("conditionBadge").style.display = "inline-flex";
      document.getElementById("conditionLabel").textContent   = diet.name;

      content.innerHTML = `
        <div class="result-card">
          <div class="result-title">
            <i class="ti ti-clipboard-list" aria-hidden="true"></i>
            Diet Plan — ${diet.name}
          </div>

          <div class="food-section-label eat">
            <i class="ti ti-circle-check" aria-hidden="true"></i>
            Foods to Eat
          </div>
          <div class="food-tags-wrap">
            ${diet.eat.map(f => `<span class="food-tag food-eat"><i class="ti ti-check" aria-hidden="true"></i> ${f}</span>`).join("")}
          </div>

          <div class="section-divider"></div>

          <div class="food-section-label avoid">
            <i class="ti ti-circle-x" aria-hidden="true"></i>
            Foods to Avoid
          </div>
          <div class="food-tags-wrap">
            ${diet.avoid.map(f => `<span class="food-tag food-avoid"><i class="ti ti-x" aria-hidden="true"></i> ${f}</span>`).join("")}
          </div>

          <div class="action-row">
            <a href="symptom.html" class="back-btn">
              <i class="ti ti-arrow-left" aria-hidden="true"></i>
              Symptoms
            </a>
            <a href="symptom_remedies.html" class="btn-remedies">
              <i class="ti ti-plant" aria-hidden="true"></i>
              View Remedies
            </a>
          </div>
        </div>`;
    }

    render();
  </script>
</body>
</html>
