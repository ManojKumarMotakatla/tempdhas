
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
   <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root{
      --navy:#0b1437;--navy-mid:#112057;--blue:#2a6cf6;--teal:#00c9b1;
      --bg:#f4f6fc;--surface:#fff;--border:#e4e9f4;--text:#0d1b3e;--muted:#6b7fa3;
      --radius:18px;--shadow:0 2px 20px rgba(42,108,246,.09);
    }

    /* ─── DARK MODE ─── */
    html.dark,html.dark body,body.dark{
      --navy:#040b1c;--navy-mid:#091230;
      --bg:#080f28;--surface:#111c3c;--border:#1e2e58;
      --text:#e8efff;--muted:#7d93c3;
      background:#080f28 !important;color:#e8efff !important;
    }
    html.dark .auth-card,body.dark .auth-card{background:#111c3c;border-color:#1e2e58;}
    html.dark .dhas-input,body.dark .dhas-input{background:#080f28;color:#e8efff;border-color:#1e2e58;}
    html.dark .dhas-input:focus,body.dark .dhas-input:focus{background:#111c3c;border-color:#2a6cf6;box-shadow:0 0 0 3px rgba(42,108,246,0.2);}
    html.dark .dhas-input::placeholder,body.dark .dhas-input::placeholder{color:#7d93c3;}
    html.dark .dhas-label,body.dark .dhas-label{color:#7d93c3;}
    html.dark .strength-segment,body.dark .strength-segment{background:#1e2e58;}
    html.dark .req-list li,body.dark .req-list li{color:#7d93c3;}
    html.dark .req-list li.ok,body.dark .req-list li.ok{color:#6ee7b7;}
    html.dark .req-list li.ok::before{color:#6ee7b7;}
    html.dark .toggle-eye,body.dark .toggle-eye{color:#7d93c3;}
    html.dark .theme-pill,body.dark .theme-pill{background:#111c3c;border-color:#1e2e58;color:#7d93c3;}
    html.dark .or-divider,body.dark .or-divider{color:#7d93c3;}
    html.dark .or-divider::before,html.dark .or-divider::after,
    body.dark .or-divider::before,body.dark .or-divider::after{background:#1e2e58;}
    html.dark .google-btn-wrap,body.dark .google-btn-wrap{background:#fff;border-color:#dadce0;}
    html.dark .dhas-alert.danger,body.dark .dhas-alert.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5;}
    html.dark .dhas-alert.success,body.dark .dhas-alert.success{background:rgba(34,208,122,.12);border-color:rgba(34,208,122,.3);color:#6ee7b7;}
    html.dark p,body.dark p{color:#7d93c3;}
    html.dark a,body.dark a{color:#7aafff;}
    html.dark .email-status.warn,body.dark .email-status.warn{color:#fbbf24;}
    html.dark .email-status.warn strong{color:#fde68a;}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;transition:background .35s,color .35s;color:var(--text);}

    .theme-toggle-wrap{position:fixed;top:16px;right:16px;z-index:100;}
    .theme-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 10px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--muted);transition:all .2s,background .35s,border-color .35s;}
    .theme-pill:hover{color:var(--blue);border-color:var(--blue);}
    .theme-pill svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;}

    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .auth-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 8px 40px rgba(42,108,246,.12);padding:36px 32px;width:100%;max-width:420px;transition:background .35s,border-color .35s;}
    .auth-logo{text-align:center;margin-bottom:24px;background:linear-gradient(145deg,var(--navy-mid),var(--navy));border-radius:14px;padding:20px;}
    .auth-logo .logo-icon{font-size:2rem;}
    .auth-logo h2{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:#fff;margin:6px 0 2px;}
    .auth-logo p{color:rgba(255,255,255,.5);font-size:.82rem;}
    .dhas-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;transition:color .35s;}
    .dhas-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s,background .35s,color .35s;margin-bottom:4px;}
    .dhas-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,108,246,.12);background:var(--surface);}
    .dhas-input::placeholder{color:var(--muted);}
    .btn-dhas{width:100%;padding:13px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;transition:all .2s;display:inline-block;text-align:center;}
    .btn-dhas.primary{background:linear-gradient(135deg,var(--blue),#4f8ef9);color:#fff;box-shadow:0 4px 16px rgba(42,108,246,.3);}
    .btn-dhas.primary:hover{transform:translateY(-1px);}
    .dhas-alert{padding:11px 14px;border-radius:10px;font-size:.84rem;font-weight:600;margin-bottom:12px;}
    .dhas-alert.danger{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}
    .dhas-alert.success{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;}
    .or-divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px;color:var(--muted);font-size:.78rem;font-weight:600;}
    .or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .google-btn-wrap{display:flex;justify-content:center;background:#ffffff;border-radius:12px;padding:10px;border:1.5px solid #dadce0;transition:box-shadow .2s;}
    .google-btn-wrap:hover{box-shadow:0 2px 12px rgba(0,0,0,.12);}

    /* password strength */
    .strength-segment{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
    .pw-wrap{position:relative;}.pw-wrap .dhas-input{padding-right:2.8rem;}
    .toggle-eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;padding:0;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .2s;z-index:5;}
    .toggle-eye:hover{color:var(--blue);}
    .toggle-eye svg{width:20px;height:20px;pointer-events:none;}
    .req-list{list-style:none;padding:0;margin:8px 0 14px;font-size:.78rem;}
    .req-list li{display:flex;align-items:center;gap:6px;color:var(--muted);margin-bottom:3px;transition:color .25s;}
    .req-list li::before{content:"✗";font-weight:700;color:#e74c3c;min-width:14px;}
    .req-list li.ok{color:#27ae60;}.req-list li.ok::before{content:"✓";color:#27ae60;}

    /* email status */
    .email-status{font-size:.75rem;margin-top:3px;margin-bottom:10px;display:none;line-height:1.5;}
    .email-status.valid  {color:#27ae60;display:block;}
    .email-status.invalid{color:#e74c3c;display:block;}
    .email-status.warn   {color:#d97706;display:block;}

    /* email input border states */
    .dhas-input.input-valid  {border-color:#27ae60 !important;}
    .dhas-input.input-invalid{border-color:#e74c3c !important;}
    .dhas-input.input-warn   {border-color:#d97706 !important;}

    .strength-bar-wrap{display:flex;gap:4px;margin-top:6px;}
    .strength-label{font-size:.75rem;margin-top:4px;font-weight:600;}
    p{color:var(--muted);}
    a{color:var(--blue);font-weight:700;text-decoration:none;}
  </style>

<script>
// ═══════════════════════════════════════════════════════════════
// COMPREHENSIVE EMAIL VALIDATION — DHAS register.html
//
// Layers of checks (in order):
//   1. Structural regex  — must look like x@y.z
//   2. Local-part rules  — no leading/trailing dots, no ".."
//   3. Domain label rules — each label ≥ 2 chars, no hyphens at
//      start/end, no purely numeric labels
//   4. TLD allowlist     — only real/common TLDs accepted
//   5. Known-bad domains — disposable / obviously fake domains
//   6. Typo detection    — Levenshtein distance against known good
//      domains, surface a "Did you mean?" suggestion
// ═══════════════════════════════════════════════════════════════

// ── 1. KNOWN GOOD DOMAINS (canonical spellings) ───────────────
// We check the user's domain against this list for typo detection.
const KNOWN_DOMAINS = [
  "gmail.com","yahoo.com","yahoo.in","yahoo.co.in","hotmail.com",
  "outlook.com","outlook.in","live.com","icloud.com","me.com",
  "protonmail.com","proton.me","zoho.com","yandex.com","yandex.ru",
  "aol.com","msn.com","rediffmail.com","rocketmail.com",
  "googlemail.com","mail.com","email.com","inbox.com",
  "tutanota.com","fastmail.com","pm.me","hey.com",
];

// ── 2. DISPOSABLE / OBVIOUSLY FAKE DOMAINS ───────────────────
const BAD_DOMAINS = new Set([
  "mailinator.com","guerrillamail.com","throwam.com","trashmail.com",
  "fakeinbox.com","tempmail.com","yopmail.com","maildrop.cc",
  "sharklasers.com","guerrillamailblock.com","grr.la","spam4.me",
  "mytemp.email","dispostable.com","10minutemail.com","temp-mail.org",
  "mailnull.com","spamgourmet.com","throwam.com","spamhereplease.com",
]);

// ── 3. TLD ALLOWLIST ─────────────────────────────────────────
// Only TLDs that real email addresses actually use.
// This prevents things like user@gmail.xyz or user@example.qwerty
const VALID_TLDS = new Set([
  // Generic
  "com","net","org","edu","gov","mil","int","info","biz","name","pro",
  "mobi","tel","travel","jobs","museum","coop","aero","cat","post",
  "xyz","online","site","web","app","io","ai","co","me","tv","cc","ws",
  "cloud","tech","store","shop","blog","media","news","agency","studio",
  "design","dev","page","email","mail","digital","solutions","services",
  "global","world","network","systems","group","team","live","show",
  // Country codes — India-specific + major ones
  "in","us","uk","gb","au","ca","de","fr","jp","cn","br","ru","za",
  "sg","nz","ie","nl","se","no","dk","fi","es","it","pt","pl","ch",
  "at","be","cz","gr","hu","ro","tr","il","ae","sa","pk","bd","lk",
  "np","my","id","ph","th","vn","hk","tw","kr",
  // Common second-level under country codes (treat as TLD after dot)
  "co","ac","gov","edu","net","org","nic",
]);

// ── 4. LEVENSHTEIN DISTANCE ───────────────────────────────────
// Used to find the closest known-good domain to what the user typed.
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) =>
    Array.from({length: n + 1}, (_, j) => (i === 0 ? j : j === 0 ? i : 0))
  );
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

// Find the closest known domain within a given edit-distance threshold.
// Returns { suggestion: "gmail.com", distance: 1 } or null.
function findClosestDomain(typed) {
  const lower = typed.toLowerCase();
  // Exact match — no suggestion needed
  if (KNOWN_DOMAINS.includes(lower)) return null;

  let best = null;
  let bestDist = Infinity;
  for (const known of KNOWN_DOMAINS) {
    const d = levenshtein(lower, known);
    if (d < bestDist) { bestDist = d; best = known; }
  }
  // Only suggest if the edit distance is small relative to the domain length
  // e.g. "gmial.com" → distance 2 from "gmail.com" → suggest
  // but "yahoo123.net" → distance too large → no suggestion
  const threshold = Math.max(2, Math.floor(lower.length * 0.35));
  return bestDist <= threshold ? { suggestion: best, distance: bestDist } : null;
}

// ── 5. STRUCTURAL CHECKS ─────────────────────────────────────
// Returns an object: { valid: bool, error: string|null, warn: string|null }
function deepValidateEmail(email) {
  const raw = email.trim();

  // Empty
  if (!raw) return { valid: false, error: null, warn: null };

  // Must contain exactly one @
  const atCount = (raw.match(/@/g) || []).length;
  if (atCount === 0) return { valid: false, error: "Missing @ symbol — email must look like name@gmail.com" };
  if (atCount > 1)  return { valid: false, error: "Email must have only one @ symbol" };

  const [local, domainPart] = raw.split("@");

  // ── Local part checks ──
  if (!local || local.length === 0)
    return { valid: false, error: "Missing username before @ (e.g. yourname@gmail.com)" };
  if (local.length > 64)
    return { valid: false, error: "Username part before @ is too long (max 64 characters)" };
  if (local.startsWith(".") || local.endsWith("."))
    return { valid: false, error: "Username cannot start or end with a dot" };
  if (local.includes(".."))
    return { valid: false, error: "Username cannot have two dots in a row" };
  // Only allow safe characters in local part
  if (!/^[a-zA-Z0-9._%+\-]+$/.test(local))
    return { valid: false, error: "Username contains invalid characters — only letters, numbers, dots, hyphens, and underscores are allowed" };

  // ── Domain part checks ──
  if (!domainPart || domainPart.length === 0)
    return { valid: false, error: "Missing domain after @ — email must look like name@gmail.com" };
  if (!domainPart.includes("."))
    return { valid: false, error: `Missing domain extension after "@${domainPart}" — try something like @gmail.com or @yahoo.in` };
  if (domainPart.startsWith(".") || domainPart.endsWith("."))
    return { valid: false, error: "Domain cannot start or end with a dot" };
  if (domainPart.includes(".."))
    return { valid: false, error: "Domain cannot have two dots in a row" };

  const labels = domainPart.toLowerCase().split(".");
  const tld    = labels[labels.length - 1];

  // TLD must be letters only (no numbers, no hyphens)
  if (!/^[a-z]+$/.test(tld))
    return { valid: false, error: `".${tld}" is not a valid domain extension — did you mean .com, .in, or .org?` };

  // TLD must be in allowlist
  if (!VALID_TLDS.has(tld))
    return { valid: false, error: `".${tld}" is not a recognised email domain extension — common ones are .com, .in, .net, .org` };

  // Each non-TLD label must be ≥ 2 chars and contain at least one letter
  for (let i = 0; i < labels.length - 1; i++) {
    const lbl = labels[i];
    if (lbl.length < 2)
      return { valid: false, error: `Domain part "${lbl}" is too short — check for typos` };
    if (lbl.startsWith("-") || lbl.endsWith("-"))
      return { valid: false, error: `Domain label "${lbl}" cannot start or end with a hyphen` };
    if (!/[a-z]/.test(lbl))
      return { valid: false, error: `Domain label "${lbl}" must contain at least one letter — check for typos` };
    if (!/^[a-z0-9\-]+$/.test(lbl))
      return { valid: false, error: `Domain label "${lbl}" contains invalid characters` };
  }

  // Disposable / fake domain check
  if (BAD_DOMAINS.has(domainPart.toLowerCase()))
    return { valid: false, error: "Disposable/temporary email addresses are not allowed — please use your real email" };

  // ── Typo / suggestion check ──
  const closest = findClosestDomain(domainPart);
  if (closest) {
    // Distance 1 = very likely a typo (e.g. "gmaill.com"), show as error
    // Distance 2 = probable typo (e.g. "gmial.com"), show as error
    // Distance 3 = possible typo, show as warning
    const isLikelyTypo = closest.distance <= 2;
    const suggestion   = `${local}@${closest.suggestion}`;
    if (isLikelyTypo) {
      return {
        valid: false,
        error: null,
        typo: true,
        suggestion,
        warn: `Did you mean <strong>${suggestion}</strong>? "${domainPart}" looks like a typo.`
      };
    } else {
      return {
        valid: true,
        warn: `Are you sure about "${domainPart}"? Did you mean <strong>${suggestion}</strong>?`
      };
    }
  }

  return { valid: true, warn: null };
}

// ── 6. UI WIRING ─────────────────────────────────────────────
let _lastValidationResult = null;

function setEmailUI(state, message) {
  // state: 'valid' | 'invalid' | 'warn' | 'reset'
  const input = document.getElementById("email");
  const status = document.getElementById("emailStatus");

  input.classList.remove("input-valid", "input-invalid", "input-warn");
  status.className = "email-status";
  status.innerHTML = "";

  if (state === "reset") return;

  if (state === "valid") {
    input.classList.add("input-valid");
    status.className = "email-status valid";
    status.textContent = message || "✓ Email looks good";
  } else if (state === "warn") {
    input.classList.add("input-warn");
    status.className = "email-status warn";
    status.innerHTML = "⚠ " + (message || "");
  } else {
    input.classList.add("input-invalid");
    status.className = "email-status invalid";
    status.innerHTML = "✗ " + (message || "Invalid email address");
  }
}

// Called on every keystroke — lenient (only flag obvious errors)
// REPLACE the existing validateEmail() function with this:
function validateEmail(email) {
  const raw = email.trim();
  if (!raw) { setEmailUI("reset"); _lastValidationResult = null; return; }

  const result = deepValidateEmail(raw);
  _lastValidationResult = result;

  const hasAt  = raw.includes("@");
  const hasDot = hasAt && raw.split("@")[1]?.includes(".");

  if (result.error) {
    // Show error immediately if user has typed past the @ and dot
    if (hasDot || result.typo) {
      setEmailUI("invalid", result.error);
    } else if (hasAt && result.error.includes("@")) {
      // e.g. missing domain — wait until dot is typed
      setEmailUI("reset");
    } else if (hasAt) {
      setEmailUI("invalid", result.error);
    } else {
      setEmailUI("reset");
    }
  } else if (result.typo) {
    setEmailUI("warn", result.warn);
  } else if (result.warn) {
    setEmailUI("warn", result.warn);
  } else if (result.valid && hasDot) {
    setEmailUI("valid");
  }
}

// Called on blur — strict (show all errors)
function validateEmailStrict(email) {
  const raw = email.trim();
  if (!raw) { setEmailUI("reset"); return; }

  const result = deepValidateEmail(raw);
  _lastValidationResult = result;

  if (result.error) {
    setEmailUI("invalid", result.error);
  } else if (result.typo) {
    setEmailUI("warn", result.warn);
  } else if (result.warn) {
    setEmailUI("warn", result.warn);
  } else if (result.valid) {
    setEmailUI("valid");
  }
}

// Returns true only if the email is genuinely valid (no errors, no typo)
function isEmailAcceptable(email) {
  const r = deepValidateEmail(email.trim());
  // Accept if valid even with a non-blocking warning (user knows their own domain)
  return r.valid === true && !r.typo;
}

// ── PASSWORD STRENGTH ─────────────────────────────────────────
const RULES = {
  len:   v => v.length >= 6,
  upper: v => /[A-Z]/.test(v),
  lower: v => /[a-z]/.test(v),
  num:   v => /[0-9]/.test(v),
  sym:   v => /[^A-Za-z0-9]/.test(v),
};
const COLORS = ["","#e74c3c","#e67e22","#f1c40f","#27ae60"];
const LABELS = ["","Weak","Fair","Good","Strong"];

function evaluatePassword(val) {
  Object.keys(RULES).forEach(k => {
    document.getElementById("req-"+k)?.classList.toggle("ok", RULES[k](val));
  });
  const score = Object.values(RULES).filter(fn => fn(val)).length;
  const bars  = val.length === 0 ? 0 : Math.max(1, Math.round(score * 4 / 5));
  const color = COLORS[bars] || "#e0e0e0";
  for (let i = 1; i <= 4; i++) {
    document.getElementById("seg"+i).style.background = i <= bars ? color : "";
  }
  const lbl = document.getElementById("strengthLabel");
  lbl.textContent = val.length === 0 ? "—" : (LABELS[bars] || "—");
  lbl.style.color = val.length === 0 ? "#aaa" : color;
}

function isPasswordValid(val) {
  return Object.values(RULES).every(fn => fn(val));
}



// ── FORM SUBMIT ───────────────────────────────────────────────
async function submitRegister() {
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errBox   = document.getElementById("errorMsg");
  const okBox    = document.getElementById("successMsg");

  const showErr = msg => {
    errBox.innerHTML  = msg;
    errBox.style.display = "block";
    okBox.style.display  = "none";
  };
  errBox.style.display = "none";

  // Name
  if (!name) { showErr("Full name is required."); return; }

  // Email — run strict validation
  if (!email) { showErr("Email address is required."); return; }

  const emailResult = deepValidateEmail(email);

  if (!emailResult.valid || emailResult.typo) {
    // Always run strict UI feedback first
    validateEmailStrict(email);

    if (emailResult.error) {
      showErr(emailResult.error);
    } else if (emailResult.typo) {
      showErr(`"${email.split("@")[1]}" looks like a typo. Did you mean <strong>${emailResult.suggestion}</strong>?<br>Please correct your email address before continuing.`);
    } else {
      showErr("Please enter a valid email address (e.g. yourname@gmail.com).");
    }
    document.getElementById("email").focus();
    return;
  }

  // Non-blocking warning (e.g. unusual but valid domain) — allow through
  // but re-run strict UI so the user sees the warning was noted
  validateEmailStrict(email);

  // Password
  if (!isPasswordValid(password)) {
    showErr("Password must be at least 6 characters and include an uppercase letter, a lowercase letter, a number, and a symbol.");
    return;
  }

handleRegister(name, email, password);   // plain password
}

  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  handleGoogleAuth(payload.name, payload.email, payload.sub);
}
