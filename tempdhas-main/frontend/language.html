<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language — DHAS</title>
<script src="theme.js"></script>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&family=Noto+Sans+Telugu:wght@400;600&family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0b1437;--navy-mid:#112057;
  --blue:#2a6cf6;--blue-lt:#4f8ef9;
  --teal:#00c9b1;--green:#22d07a;
  --bg:#f4f6fc;--surface:#ffffff;--border:#e4e9f4;
  --text:#0d1b3e;--muted:#6b7fa3;
  --shadow:0 2px 20px rgba(42,108,246,.09);
  --shadow-md:0 8px 32px rgba(42,108,246,.16);
}
html.dark body,body.dark{
  --bg:#080f28;--surface:#111c3c;--border:#1e2e58;
  --text:#e8efff;--muted:#7d93c3;
}
body.doctor-portal{
  --blue:#059669;--blue-lt:#00c9b1;
  --navy:#064e3b;--navy-mid:#065f46;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .35s,color .35s;}

/* TOPBAR */
.topbar{height:60px;display:flex;align-items:center;padding:0 20px;justify-content:space-between;
  background:linear-gradient(145deg,var(--navy-mid),var(--navy));}
.brand{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;color:#fff;}
.back-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.85);font-size:.83rem;font-weight:600;
  text-decoration:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);
  padding:6px 16px;border-radius:20px;transition:background .2s;white-space:nowrap;}
.back-btn:hover{background:rgba(255,255,255,.22);}
.back-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;flex-shrink:0;}

/* PAGE */
.page{max-width:480px;margin:0 auto;padding:24px 16px 52px;}

/* HERO */
.hero{text-align:center;padding:32px 20px 26px;margin-bottom:22px;
  background:linear-gradient(145deg,var(--navy) 0%,var(--navy-mid) 55%,var(--blue) 100%);
  border-radius:22px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;
  background:rgba(255,255,255,.05);border-radius:50%;}
.hero::after{content:'';position:absolute;bottom:-35px;left:20px;width:120px;height:120px;
  background:rgba(255,255,255,.04);border-radius:50%;}
.hero-icon{font-size:2.6rem;margin-bottom:10px;position:relative;}
.hero-title{font-family:'Fraunces',serif;font-size:1.75rem;font-weight:700;color:#fff;
  line-height:1.2;margin-bottom:6px;position:relative;}
.hero-sub{color:rgba(255,255,255,.6);font-size:.84rem;line-height:1.55;position:relative;}

/* LANG CARDS */
.lang-grid{display:flex;flex-direction:column;gap:11px;margin-bottom:18px;}

.lang-card{
  background:var(--surface);border:2px solid var(--border);border-radius:16px;
  padding:18px 20px;cursor:pointer;
  display:flex;align-items:center;gap:16px;
  text-align:left;width:100%;font-family:inherit;color:var(--text);
  transition:border-color .2s,box-shadow .2s,transform .18s;
  position:relative;overflow:hidden;
}
.lang-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(42,108,246,.05),rgba(0,201,177,.03));
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.lang-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-md);}
.lang-card:hover::after{opacity:1;}
.lang-card:active{transform:scale(.98);}
.lang-card.active{
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(42,108,246,.14),var(--shadow-md);
}
.lang-card.active::after{opacity:1;}
body.doctor-portal .lang-card.active{
  box-shadow:0 0 0 4px rgba(5,150,105,.14),var(--shadow-md);
}

/* Flag box */
.flag-box{width:56px;height:56px;border-radius:13px;flex-shrink:0;font-size:1.9rem;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);border:1.5px solid var(--border);transition:all .2s;}
.lang-card:hover .flag-box,.lang-card.active .flag-box{
  background:rgba(42,108,246,.07);border-color:rgba(42,108,246,.25);}
body.doctor-portal .lang-card:hover .flag-box,
body.doctor-portal .lang-card.active .flag-box{
  background:rgba(5,150,105,.07);border-color:rgba(5,150,105,.25);}

/* Text */
.lang-info{flex:1;min-width:0;}
.lang-name{font-family:'Fraunces',serif;font-weight:700;font-size:1.05rem;
  color:var(--text);transition:color .2s;line-height:1.2;}
.lang-card:hover .lang-name,.lang-card.active .lang-name{color:var(--blue);}
body.doctor-portal .lang-card:hover .lang-name,
body.doctor-portal .lang-card.active .lang-name{color:var(--blue);}
.lang-script{font-size:.95rem;color:var(--muted);margin-top:3px;font-weight:600;line-height:1.3;}
.lang-sub{font-size:.75rem;color:var(--muted);margin-top:4px;opacity:.7;}

/* Check circle */
.check-ring{width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lang-card.active .check-ring{background:var(--blue);border-color:var(--blue);}
.check-ring svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:3;
  opacity:0;transform:scale(.4);transition:opacity .18s,transform .18s;}
.lang-card.active .check-ring svg{opacity:1;transform:scale(1);}

/* GO BUTTON */
.go-btn{
  width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:700;color:#fff;
  background:linear-gradient(135deg,var(--blue),var(--blue-lt));
  box-shadow:0 4px 18px rgba(42,108,246,.3);
  transition:transform .18s,box-shadow .18s,opacity .18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:14px;
}
.go-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 7px 26px rgba(42,108,246,.42);}
.go-btn:active:not(:disabled){transform:scale(.98);}
.go-btn:disabled{opacity:.38;cursor:default;}
.go-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2.2;}

/* Footer */
.foot{text-align:center;font-size:.77rem;color:var(--muted);line-height:1.6;}

/* FULLSCREEN REDIRECT OVERLAY */
.redir{
  position:fixed;inset:0;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  z-index:9999;
  opacity:0;visibility:hidden;
  transition:opacity .28s,visibility .28s;
}
.redir.show{opacity:1;visibility:visible;}
.redir-spinner{
  width:46px;height:46px;
  border:3px solid rgba(255,255,255,.15);
  border-top-color:#fff;border-radius:50%;
  animation:spin .75s linear infinite;
}
.redir-flag{font-size:2.4rem;}
.redir-text{color:rgba(255,255,255,.82);font-size:.95rem;font-weight:600;text-align:center;max-width:240px;line-height:1.5;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Dark mode card surface */
html.dark .lang-card,body.dark .lang-card{background:var(--surface);}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">🏥 DHAS</div>
  <a id="navBack" href="dashboard.html" class="back-btn">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    <span id="backLabel">Dashboard</span>
  </a>
</header>

<!-- REDIRECT OVERLAY -->
<div class="redir" id="redir">
  <div class="redir-flag" id="redirFlag">🌐</div>
  <div class="redir-spinner"></div>
  <div class="redir-text" id="redirText">Saving…</div>
</div>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-icon">🌐</div>
    <div class="hero-title" id="heroTitle">Choose your language</div>
    <div class="hero-sub" id="heroSub">Tap a language — the whole app switches instantly</div>
  </div>

  <!-- CARDS -->
  <div class="lang-grid">

    <button class="lang-card" id="card-English" onclick="pick('English')">
      <div class="flag-box">🇬🇧</div>
      <div class="lang-info">
        <div class="lang-name">English</div>
        <div class="lang-script">English</div>
        <div class="lang-sub" id="sub-English">~1.5 billion speakers worldwide</div>
      </div>
      <div class="check-ring">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
    </button>

    <button class="lang-card" id="card-Hindi" onclick="pick('Hindi')">
      <div class="flag-box">🇮🇳</div>
      <div class="lang-info">
        <div class="lang-name">हिंदी</div>
        <div class="lang-script">Hindi — हिंदी</div>
        <div class="lang-sub" id="sub-Hindi">~600 million speakers</div>
      </div>
      <div class="check-ring">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
    </button>

    <button class="lang-card" id="card-Telugu" onclick="pick('Telugu')">
      <div class="flag-box">🇮🇳</div>
      <div class="lang-info">
        <div class="lang-name">తెలుగు</div>
        <div class="lang-script">Telugu — తెలుగు</div>
        <div class="lang-sub" id="sub-Telugu">~90 million speakers</div>
      </div>
      <div class="check-ring">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
    </button>

  </div>

  <!-- GO BUTTON -->
  <button class="go-btn" id="goBtn" onclick="goNow()" disabled>
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
    <span id="goBtnText">Select a language above</span>
  </button>

  <p class="foot" id="footNote">Your preference is saved and applies across all pages.</p>

</div>

<script>
(function(){

/* ── All UI strings per language ── */
var UI = {
  English: {
    heroTitle:   'Choose your language',
    heroSub:     'Tap a language — the whole app switches instantly',
    subEnglish:  '~1.5 billion speakers worldwide',
    subHindi:    '~600 million speakers',
    subTelugu:   '~90 million speakers',
    goBtnReady:  'Go to Dashboard',
    goingMsg:    'Opening your dashboard…',
    savingMsg:   'Saving language preference…',
    footNote:    'Your preference is saved and applies across all pages.',
    backLabel:   'Dashboard',
    flag:        '🇬🇧'
  },
  Hindi: {
    heroTitle:   'अपनी भाषा चुनें',
    heroSub:     'एक भाषा चुनें — पूरा ऐप तुरंत बदल जाएगा',
    subEnglish:  'विश्व में ~1.5 अरब वक्ता',
    subHindi:    '~60 करोड़ वक्ता',
    subTelugu:   '~9 करोड़ वक्ता',
    goBtnReady:  'डैशबोर्ड पर जाएं',
    goingMsg:    'डैशबोर्ड खुल रहा है…',
    savingMsg:   'भाषा सहेजी जा रही है…',
    footNote:    'आपकी पसंद सहेजी गई है और सभी पृष्ठों पर लागू होती है।',
    backLabel:   'डैशबोर्ड',
    flag:        '🇮🇳'
  },
  Telugu: {
    heroTitle:   'మీ భాషను ఎంచుకోండి',
    heroSub:     'ఒక భాషను నొక్కండి — యాప్ అంతా వెంటనే మారుతుంది',
    subEnglish:  'ప్రపంచవ్యాప్తంగా ~150 కోట్ల మాట్లాడేవారు',
    subHindi:    '~60 కోట్ల మాట్లాడేవారు',
    subTelugu:   '~9 కోట్ల మాట్లాడేవారు',
    goBtnReady:  'డాష్‌బోర్డ్‌కు వెళ్ళండి',
    goingMsg:    'డాష్‌బోర్డ్ తెరుచుకుంటోంది…',
    savingMsg:   'భాష సేవ్ అవుతోంది…',
    footNote:    'మీ ప్రాధాన్యత సేవ్ చేయబడింది మరియు అన్ని పేజీలలో వర్తిస్తుంది.',
    backLabel:   'డాష్‌బోర్డ్',
    flag:        '🇮🇳'
  }
};

/* ── Portal detection ── */
var params   = new URLSearchParams(window.location.search);
var docToken = localStorage.getItem('dhas_doctor_token');
var patToken = localStorage.getItem('dhas_token');
var ref      = document.referrer || '';
var isDoc    =
  params.get('portal') === 'doctor' ||
  sessionStorage.getItem('dhas_portal') === 'doctor' ||
  ref.indexOf('doctor') !== -1 ||
  (!!docToken && !patToken);

if (isDoc) {
  sessionStorage.setItem('dhas_portal','doctor');
  document.body.classList.add('doctor-portal');
} else {
  sessionStorage.removeItem('dhas_portal');
}

var DEST = isDoc ? 'doctor_dashboard.html' : 'dashboard.html';

/* ── State ── */
var selected = localStorage.getItem('dhas_language') || null;

/* Apply UI strings for a given language */
function applyUI(lang) {
  var s = UI[lang] || UI.English;
  setText('heroTitle',  s.heroTitle);
  setText('heroSub',    s.heroSub);
  setText('sub-English',s.subEnglish);
  setText('sub-Hindi',  s.subHindi);
  setText('sub-Telugu', s.subTelugu);
  setText('footNote',   s.footNote);
  setText('backLabel',  s.backLabel);
  // Update go button
  var goSpan = document.getElementById('goBtnText');
  if (goSpan) goSpan.textContent = s.goBtnReady;
  // Update html lang
  var codes = {English:'en',Hindi:'hi',Telugu:'te'};
  document.documentElement.lang = codes[lang] || 'en';
}

function setText(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

/* Mark selected card */
function markCards(lang) {
  ['English','Hindi','Telugu'].forEach(function(l){
    var c = document.getElementById('card-'+l);
    if (c) c.classList.toggle('active', l === lang);
  });
}

/* ── Initial state ── */
if (selected) {
  markCards(selected);
  applyUI(selected);
  var goBtn = document.getElementById('goBtn');
  if (goBtn) goBtn.disabled = false;
}

/* ── Pick a language ── */
window.pick = function(lang) {
  selected = lang;
  localStorage.setItem('dhas_language', lang);  // save immediately
  markCards(lang);
  applyUI(lang);
  var goBtn = document.getElementById('goBtn');
  if (goBtn) goBtn.disabled = false;
};

/* ── Navigate to dashboard ── */
window.goNow = function() {
  if (!selected) return;

  var s       = UI[selected] || UI.English;
  var overlay = document.getElementById('redir');
  var flag    = document.getElementById('redirFlag');
  var txt     = document.getElementById('redirText');

  if (flag) flag.textContent = s.flag;
  if (txt)  txt.textContent  = s.savingMsg;
  if (overlay) overlay.classList.add('show');

  setTimeout(function(){
    if (txt) txt.textContent = s.goingMsg;
  }, 500);

  setTimeout(function(){
    window.location.href = DEST;
  }, 1100);
};

})();
</script>
<script src="js/language.js"></script>
</body>
</html>
